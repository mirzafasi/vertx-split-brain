version: "3.9"

# A 4-node cluster so we can partition it 2-2 and observe a real split-brain.
# All nodes share the SB_HZ_MEMBERS list so Hazelcast discovers each other on startup.
# Then we use the `partition.sh` script to drop packets on port 5701 between the two halves.

x-common: &common
  image: vertx-split-brain:local
  build: .
  cap_add: [ NET_ADMIN ]      # needed for iptables-based simulation
  environment:
    SB_HZ_MEMBERS: "node1,node2,node3,node4"
    SB_DETECT_INTERVAL_MS: "3000"
    SB_GRACE_WINDOW_MS: "10000"
    SB_SIMULATION_ENABLED: "true"
    SB_HTTP_PORT: "8080"
  networks: [ cluster_net ]

services:
  node1:
    <<: *common
    hostname: node1
    container_name: node1
    environment:
      SB_PEERS: "node2:8080,node3:8080,node4:8080"
      SB_HZ_MEMBERS: "node1,node2,node3,node4"
      SB_DETECT_INTERVAL_MS: "3000"
      SB_GRACE_WINDOW_MS: "10000"
      SB_SIMULATION_ENABLED: "true"
      SB_HTTP_PORT: "8080"
    ports: [ "8081:8080" ]

  node2:
    <<: *common
    hostname: node2
    container_name: node2
    environment:
      SB_PEERS: "node1:8080,node3:8080,node4:8080"
      SB_HZ_MEMBERS: "node1,node2,node3,node4"
      SB_DETECT_INTERVAL_MS: "3000"
      SB_GRACE_WINDOW_MS: "10000"
      SB_SIMULATION_ENABLED: "true"
      SB_HTTP_PORT: "8080"
    ports: [ "8082:8080" ]

  node3:
    <<: *common
    hostname: node3
    container_name: node3
    environment:
      SB_PEERS: "node1:8080,node2:8080,node4:8080"
      SB_HZ_MEMBERS: "node1,node2,node3,node4"
      SB_DETECT_INTERVAL_MS: "3000"
      SB_GRACE_WINDOW_MS: "10000"
      SB_SIMULATION_ENABLED: "true"
      SB_HTTP_PORT: "8080"
    ports: [ "8083:8080" ]

  node4:
    <<: *common
    hostname: node4
    container_name: node4
    environment:
      SB_PEERS: "node1:8080,node2:8080,node3:8080"
      SB_HZ_MEMBERS: "node1,node2,node3,node4"
      SB_DETECT_INTERVAL_MS: "3000"
      SB_GRACE_WINDOW_MS: "10000"
      SB_SIMULATION_ENABLED: "true"
      SB_HTTP_PORT: "8080"
    ports: [ "8084:8080" ]

networks:
  cluster_net:
    driver: bridge
