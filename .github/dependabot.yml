version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: [ "dependencies", "maven" ]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels: [ "dependencies", "github-actions" ]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    labels: [ "dependencies", "docker" ]
