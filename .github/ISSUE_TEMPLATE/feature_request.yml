name: Feature request
description: Suggest a new capability or improvement
labels: [ "enhancement" ]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve? What can you not do today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How would you like it to work? Sketches, API ideas, references to similar tools all welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they fall short.

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: Help us keep the project focused.
      options:
        - label: This feature is about detecting, simulating, or alerting on split-brain — not resolving it (resolution is the cluster manager's job).
          required: true
